<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vulnpath-ai</title>
    <meta
      name="description"
      content="vulnpath-ai project site hosted with GitHub Pages."
    />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #09111f;
        color: #eef4ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(61, 130, 246, 0.35), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.22), transparent 28rem),
          #09111f;
      }

      main {
        width: min(42rem, calc(100% - 2rem));
        padding: 3rem;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 1.5rem;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 2rem 5rem rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.5rem, 8vw, 5rem);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 1.15rem;
        line-height: 1.65;
      }

      .badge {
        display: inline-flex;
        margin-bottom: 1.5rem;
        padding: 0.4rem 0.75rem;
        border: 1px solid rgba(45, 212, 191, 0.45);
        border-radius: 999px;
        color: #5eead4;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">GitHub Pages ready</span>
      <h1>vulnpath-ai</h1>
      <p>
        This repository is configured to deploy a static project site with GitHub
        Pages at <strong>username.github.io/vulnpath-ai</strong>.
      </p>
    </main>
  </body>
</html>
